spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:scanspend;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.jpa.open-in-view=false
app.jwt.secret=c2NhbnNwZW5kLXN1cGVyLXNlY3JldC1rZXktMzJieXRlcyEh
app.jwt.expiration-ms=86400000

# Optional mail settings (fill to enable email reminders)
spring.mail.host=
spring.mail.port=
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Tesseract native lib location (Homebrew)
jna.library.path=/opt/homebrew/opt/tesseract/lib
TESSDATA_PREFIX=/opt/homebrew/share/tessdata

# Increase upload size for receipt images
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# Where to store uploaded receipt images (served under /uploads/**)
app.upload-dir=uploads

# Bind to the environment-provided port in Render (falls back to 8080 locally)
server.port=${PORT:8080}

# Admin API key for listing users (set ADMIN_KEY env var in Render)
app.admin-key=${ADMIN_KEY:}
